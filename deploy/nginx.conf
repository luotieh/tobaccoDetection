# 烟草违法监测 — 管理端反向代理 + HTTP Basic 鉴权（方案 a）
#
# 用途：在管理端（127.0.0.1:8000，纯内网无鉴权）前面套一层 HTTP Basic，
#       让内部试点的真实用户必须输入账号密码才能访问。应用本身零改动。
#
# 部署要点：
#   1. 管理端绑定到本机回环：启动时设 MANAGEMENT_HOST=127.0.0.1（见 deploy/README.md）。
#   2. 生成口令文件：bash scripts/gen_htpasswd.sh <用户名>  → 产出 deploy/.htpasswd
#   3. 将本文件并入 nginx，reload。对外只暴露本 server 的端口，不要再直接暴露 8000。
#
# 注意：视觉/文本/语音三个微服务也应只绑定 127.0.0.1（见 .env.example 的 *_HOST），
#       否则它们仍可被同网段无鉴权访问。

upstream tobacco_management {
    server 127.0.0.1:8000;
}

server {
    listen 8443;                     # 对外访问端口，可按需改为 80/443（配 TLS）
    server_name _;

    # 与应用层 MAX_UPLOAD_MB=200 对齐，留出 multipart 边界开销
    client_max_body_size 210m;

    # 全站 HTTP Basic 鉴权
    auth_basic           "Tobacco Monitoring Admin";
    auth_basic_user_file /etc/nginx/tobacco.htpasswd;   # 由 scripts/gen_htpasswd.sh 生成后拷入

    location / {
        proxy_pass         http://tobacco_management;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 识别长视频/长音频可能较慢，放宽超时
        proxy_connect_timeout 60s;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }
}
